version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: uit_fms_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: uit_fms
    ports:
      - '5439:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: uit_fms_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@uit.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  postgres_data:
