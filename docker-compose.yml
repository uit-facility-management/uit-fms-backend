version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: uit_fms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: uit_fms
    ports:
      - '5439:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: uit_fms_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@uit.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres

  redis:
    image: redis:7
    container_name: uit_fms_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: [
      "redis-server",
      "--appendonly", "yes"
    ]
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
