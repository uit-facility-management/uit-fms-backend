version: '3.9'

services:
  backend:
    image: ch0musuk33/uit-fms-backend:latest
    container_name: uit_fms_backend
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "3001:3001"

    depends_on:
      - postgres
      - redis

    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

    command: --interval 30 --cleanup --label-enable

  postgres:
    image: postgres:15
    container_name: uit_fms_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: uit_fms

    ports:
      - "5439:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  redis:
    image: redis:7
    container_name: uit_fms_redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    labels:
      - "com.centurylinklabs.watchtower.enable=false"

volumes:
  postgres_data:
  redis_data: